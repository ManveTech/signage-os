version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "0:5000"
    restart: always
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
