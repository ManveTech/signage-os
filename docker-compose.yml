version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Using placeholders so Coolify automatically detects these build arguments in the UI
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "0:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
